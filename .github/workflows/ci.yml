name: CI
on:
  push:
    branches:
      - main
    tags: ['*']
  pull_request:
  workflow_dispatch:

concurrency:
  # Skip intermediate builds: always.
  # Cancel intermediate builds: only if it is a pull request build.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    continue-on-error: ${{ matrix.allow_failure }}
    permissions:
      actions: write
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - version: '1.10'
            os: ubuntu-latest
            arch: x64
            allow_failure: false
          - version: '1'
            os: ubuntu-latest
            arch: x64
            allow_failure: false
          - version: 'nightly'
            os: ubuntu-latest
            arch: x64
            allow_failure: true
          - version: '1.10'
            os: windows-latest
            arch: x64
            allow_failure: false
          - version: '1'
            os: windows-latest
            arch: x64
            allow_failure: false
          - version: 'nightly'
            os: windows-latest
            arch: x64
            allow_failure: true
          - version: '1.10'
            os: macos-latest
            arch: aarch64
            allow_failure: false
          - version: '1'
            os: macos-latest
            arch: aarch64
            allow_failure: false
          - version: 'nightly'
            os: macos-latest
            arch: aarch64
            allow_failure: true
    steps:
      - uses: actions/checkout@v7
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v3
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
      - uses: julia-actions/julia-processcoverage@v1
      - uses: codecov/codecov-action@v7
        with:
          files: lcov.info
          fail_ci_if_error: false
          use_oidc: true
